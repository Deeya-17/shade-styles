/* ---- Container ---- */

}

  margin-top: 20px;

.preview-image {

.drag-box {

uploadArea.addEventListener("dragover", e => { e.preventDefault(); uploadArea.classList.add("dragover"); });

uploadArea.addEventListener("drop", e => {

// ================= Detect Face Shape =================
detectBtn.addEventListener("click", async () => {
  if (!uploadedFile) return alert("Please upload an image first!");

  if (!faceLandmarker) return alert("Face model not loaded yet. Try again.");

  const img = new Image();
  img.src = URL.createObjectURL(uploadedFile);

  img.onload = async () => {
    const results = await faceLandmarker.detect(img);

    if (!results.faceLandmarks || results.faceLandmarks.length === 0) {
      alert("No face detected. Try a clearer front-facing photo.");
      return;
    }

    const points = results.faceLandmarks[0];
    const shape = calculateFaceShape(points);
    showResults(shape);
  };
});

// ================= Face Shape Calculation =================
function calculateFaceShape(points) {
  const leftCheek = points[234];
  const rightCheek = points[454];
  const chin = points[152];
  const forehead = points[10];

  const cheekWidth = distance(leftCheek, rightCheek);
  const faceLength = distance(chin, forehead);

  const ratio = faceLength / cheekWidth;

  if (ratio > 1.55) return "oval";
  if (ratio > 1.38) return "heart";
  if (ratio > 1.28) return "diamond";
  if (ratio > 1.18) return "round";
  return "square";
}

function distance(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y, a.z - b.z);
}

// ================= Show Results =================
function showResults(shape) {
  result.style.display = "block";
  resultImage.src = userImage.src;
  faceShapeName.textContent = shape.charAt(0).toUpperCase() + shape.slice(1);

  function renderHairstyles(items) {
  return items.map(item =>
    `<div class="suggestion-card">
       <img src="${item.img}">
       <p>${item.name}</p>
     </div>`
  ).join("");
}

  function render(items) {
    return items.map(item =>
      `<div class="suggestion-card">
         <img src="${item.img}">
         <a href="${item.link}" target="_blank" class="shop-btn">Shop</a>
         <p>${item.name}</p>
       </div>`
    ).join("");
  }

  hairstyles.innerHTML = renderHairstyles(faceShapeData[shape].hairstyles);
  accessories.innerHTML = render(faceShapeData[shape].accessories);
  sunglasses.innerHTML = render(faceShapeData[shape].sunglasses);
}
