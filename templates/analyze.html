<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Analyze | Fashion Color Theory</title>
  <style>
    body {
      background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
      font-family: 'Poppins', sans-serif;
      text-align: center;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #333;
    }
    h1 {
      color: #e91e63;
    }
    .btn {

      border-radius: 25px;

      transform: scale(1.05);

  <h1>Welcome to the Analysis Page 🎨</h1>
