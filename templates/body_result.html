<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Body Shape Result | Shade Styles AI</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffe6f0, #fff5fa);
      color: #333;
      text-align: center;
      margin: 0;
      padding: 40px;
    }

    .card {
      background: #fff;
      padding: 30px;
      border-radius: 20px;
      max-width: 700px;
      margin: auto;
      box-shadow: 0 6px 20px rgba(255, 182, 193, 0.3);
      animation: fadeIn 0.8s ease;
    }

    h1 {
      color: #d63384;
      font-size: 24px;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      font-size: 15px;
    }

    /* ⭐ Attire Image Grid */
    .attire-grid {
      margin-top: 25px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 10px;
    }

    .attire-card {
      background: #ffe8f0;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 4px 12px rgba(255, 105, 135, 0.25);
      transition: 0.3s ease;
    }

    .attire-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 18px rgba(255, 105, 135, 0.35);
    }

    .attire-card img {
  width: 100%;
  height: 220px;        /* Taller so full outfit shows */
  object-fit: contain;  /* Shows full image without cropping */
  background: #fff;     /* Adds clean background */
  border-radius: 12px;
  margin-bottom: 10px;
  border: 2px solid #f8bcd0;
}


    .attire-card p {
      font-weight: 600;
      color: #d63384;
      margin: 0;
    }

    /* Buttons */
    a {
      display: inline-block;
      margin-top: 25px;
      background: linear-gradient(135deg, #ff80ab, #ff4081);
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 30px;
      font-weight: 600;
      box-shadow: 0 6px 15px rgba(255, 105, 135, 0.25);
      transition: all 0.3s ease;
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(255, 105, 135, 0.35);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Detected Body Shape: {{ result.shape }}</h1>
    <p><strong>Confidence:</strong> {{ (result.confidence * 100) | round(1) }}%</p>

    <!-- Shape Image -->
    <img 
      src="{{ url_for('static', filename='shapes/' + result.shape|lower|replace(' ', '_') + '.jpeg') }}" 
      alt="{{ result.shape }} shape"
      style="width:200px; border-radius:15px; margin-top:15px; border: 3px solid #f8bcd0;"
    >

    <h3 style="margin-top: 30px;">Recommended Attire:</h3>

    <!-- ⭐ Attire Image Grid -->
    <div class="attire-grid">
      {% for item in result.attire %}
      <div class="attire-card">
        <img 
          src="{{ url_for('static', filename='attire/' + result.shape|lower|replace(' ', '_') + '_' + loop.index|string + '.jpeg') }}" 
          alt="{{ item }}">
        <p>{{ item }}</p>
      </div>
      {% endfor %}
    </div>

    <a href="{{ url_for('start_analysis') }}">Analyze Again</a>
    <a href="/view_looks?shape={{ result.shape }}" class="btn shop">Shop Styles</a>
    <a href="{{ url_for('faces') }}">Next</a>
  </div>

</body>
</html>
