<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Body Shape Detector | Shade Styles AI</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ffe6f0, #fff5fa);
      margin: 0;
      padding: 0;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      animation: fadeIn 1s ease-out;
    }

    h1 {
      color: #d63384;
      font-size: 30px;
      margin-bottom: 8px;
    }

    p {
      color: #555;
      margin-bottom: 20px;
      font-size: 16px;
    }

    form {
      display: inline-block;
      background: #fff;
      padding: 35px 45px;
      border-radius: 22px;
      box-shadow: 0 10px 25px rgba(255, 182, 193, 0.3);
      text-align: center;
      animation: slideUp 1s ease;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: 600;
      color: #e75480;
    }

    input {
      margin-top: 8px;
      padding: 10px;
      border-radius: 10px;
      border: 1.5px solid #f5b8c4;
      width: 180px;
      outline: none;
      font-size: 15px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    input:focus {
      border-color: #ff80ab;
      box-shadow: 0 0 8px rgba(255, 128, 171, 0.3);
    }

    button {
      background: linear-gradient(135deg, #ff80ab, #ff4081);
      color: white;
      border: none;
      padding: 12px 35px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 25px;
      font-size: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 6px 15px rgba(255, 105, 135, 0.25);
    }

    button:hover {
      background: linear-gradient(135deg, #ff4081, #ff80ab);
      transform: translateY(-3px);
      box-shadow: 0 8px 18px rgba(255, 105, 135, 0.35);
    }

    .icon {
      font-size: 50px;
      color: #e75480;
      margin-bottom: 10px;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="icon">
    <i class="ri-ruler-line"></i>
  </div>
  <h1>Body Shape Detector</h1>
  <p>Enter your body measurements (in inches):</p>

  <form method="POST" action="/start-analysis">
    <label for="bust">Bust</label>
    <input type="number" step="0.1" name="bust" id="bust" required>

    <label for="waist">Waist</label>
    <input type="number" step="0.1" name="waist" id="waist" required>

    <label for="hips">Hips</label>
    <input type="number" step="0.1" name="hips" id="hips" required>
    <label>
    <button type="submit"><i class="ri-search-eye-line"></i> Detect Shape</button>
    </label>
  </form>
  <button> <a href="{{ url_for('dashboard') }}" class="dashboard">Back to dashboard</a> </button>
</body>
</html>
