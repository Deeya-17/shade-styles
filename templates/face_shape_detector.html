<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detect Your Face Shape | Shade Styles </title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #fff0f5, #ffe6f0);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #333;
      margin: 0;
    }

    .upload-box {
      background: #fff;
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(255, 182, 193, 0.25);
      text-align: center;
      width: 400px;
      transition: all 0.4s ease;
    }

    .upload-box:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 35px rgba(255, 182, 193, 0.35);
    }

    h1 {
      color: #d6336c;
      font-size: 36px;
      margin-bottom: 15px;
      letter-spacing: 0.5px;
    }

    input[type="file"] {
      margin: 20px 0;
      padding: 10px;
      border: 2px dashed #ff9fba;
      border-radius: 12px;
      width: 100%;
      cursor: pointer;
      transition: border-color 0.3s ease, background 0.3s ease;
      background: #fff9fb;
    }

    input[type="file"]:hover {
      border-color: #ff6fa1;
      background: #fff0f6;
    }

    button {
      background: linear-gradient(135deg, #ff7aa2, #ff9ccf);
      color: #fff;
      border: none;
      padding: 12px 25px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s ease;
      letter-spacing: 0.4px;
    }

    button:hover {
      background: linear-gradient(135deg, #ff5b9e, #ff7ab5);
      transform: scale(1.05);
      box-shadow: 0 6px 18px rgba(255, 105, 180, 0.3);
    }

    .error {
      color: #d6336c;
      margin-top: 10px;
      font-size: 14px;
      font-weight: 500;
    }

    a.home {
      display: block;
      margin-top: 15px;
      color: #e75480;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    a.home:hover {
      color: #ff4c8b;
    }
  </style>
</head>
<body>
  <div class="upload-box">
    <h1>Face shape Detector</h1>
    <h2>Upload Your Photo</h2>
    <form action="{{ url_for('face_shape_detector') }}" method="post" enctype="multipart/form-data">
      <input type="file" name="image" accept="image/*" required>
      <button type="submit">Detect Face Shape</button>
    </form>
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
  </div>
</body>
</html>
